include:
  - webui.yml

services:
  ollama:
    image: ollama/ollama:0.18.2-rocm
    restart: unless-stopped
    volumes:
      - ./ollama:/root/.ollama
    devices:
      - /dev/dri
      - /dev/kfd
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
      - OLLAMA_MAX_VRAM=21474836480
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_CONTEXT_LENGTH=4096
      - HSA_ENABLE_SDMA=0
      - HSA_DISABLE_FRAGMENT_ALLOCATOR=1
      - OLLAMA_KV_CACHE_TYPE=q4_0
      - OLLAMA_KEEP_ALIVE=0
    security_opt:
      - seccomp:unconfined
    group_add:
      - video
    ports:
      - 11434:11434
    pull_policy: always
    tty: true
