services:
  comfyui:
    init: true
    image: yanwk/comfyui-boot:rocm6
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
      - PYTORCH_CUDA_ALLOC_CONF=garbage_collection_threshold:0.6,max_split_size_mb:128
      - CLI_ARGS="--lowvram --fast"
      # - HIP_VISIBLE_DEVICES=0
      - HSA_DISABLE_FRAGMENT_ALLOCATOR=1
      # - PYTORCH_TUNABLEOP_ENABLED=1
    devices:
      - /dev/kfd
      - /dev/dri
    ipc: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
      - label:disable
    group_add:
      - video
      - render
    volumes:
      - ./storage:/root
    ports:
      - 8188:8188
    restart: unless-stopped
