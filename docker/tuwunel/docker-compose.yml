services:
  tuwunel:
    image: jevolk/tuwunel:latest
    restart: unless-stopped
    volumes:
      - /media/storage/dbs/tuwunel:/var/lib/tuwunel
      - ./tuwunel.toml:/etc/tuwunel.toml
    environment:
      TUWUNEL_SERVER_NAME: matrix.oliviero.xyz
      TUWUNEL_DATABASE_PATH: /var/lib/tuwunel
      TUWUNEL_PORT: 6167
      TUWUNEL_MAX_REQUEST_SIZE: 20000000
      TUWUNEL_ALLOW_REGISTRATION: 'false'
      # TUWUNEL_REGISTRATION_TOKEN: 'YOUR_TOKEN' # A registration token is required when registration is allowed.
      # TUWUNEL_YES_I_AM_VERY_VERY_SURE_I_WANT_AN_OPEN_REGISTRATION_SERVER_PRONE_TO_ABUSE: 'true'
      TUWUNEL_ALLOW_FEDERATION: 'true'
      TUWUNEL_TRUSTED_SERVERS: '["matrix.org"]'
      #TUWUNEL_LOG: warn,state_res=warn
      TUWUNEL_ADDRESS: 0.0.0.0
      TUWUNEL_CONFIG: '/etc/tuwunel.toml' # Uncomment if you mapped config toml above

      # We need some way to serve the client and server .well-known json. The simplest way is via the TUWUNEL_WELL_KNOWN
      # variable / config option, there are multiple ways to do this, e.g. in the tuwunel.toml file, and in a separate
      # see the override file for more information about delegation
      TUWUNEL_WELL_KNOWN__SERVER: 'matrix.oliviero.xyz:443'
      TUWUNEL_WELL_KNOWN__CLIENT: 'https://matrix.oliviero.xyz'
    ulimits: # tuwunel uses quite a few file descriptors, and on some systems it defaults to 1024, so you can tell docker to increase it
      nofile:
        soft: 1048567
        hard: 1048567
    labels:
      traefik.enable: true
      traefik.http.routers.tuwunel.rule: Host(`matrix.oliviero.xyz`)
      traefik.http.routers.tuwunel.tls: true
      traefik.http.routers.tuwunel.entrypoints: websecure
      traefik.http.routers.tuwunel.tls.certresolver: production 
      traefik.http.routers.tuwunel.middlewares: cors-headers@docker
      traefik.http.routers.tuwunel.service: tuwunel
      traefik.http.services.tuwunel.loadbalancer.server.port: 6167
      traefik.http.middlewares.cors-headers.headers.accessControlAllowOriginList: "*"
      traefik.http.middlewares.cors-headers.headers.accessControlAllowHeaders: Origin, X-Requested-With, Content-Type, Accept, Authorization
      traefik.http.middlewares.cors-headers.headers.accessControlAllowMethods: GET, POST, PUT, DELETE, OPTIONS
      traefik.docker.network: proxy-net

    networks:
      - proxy-net

networks:
  proxy-net:
    external: true
