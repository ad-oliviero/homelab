http:
  routers:
    comfyui:
      rule: "Host(`comfyui.oliviero.xyz`)"
      entryPoints:
        - websecure
      tls:
        certresolver: production
      service: comfyui

  services:
    comfyui:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.120:8188"

