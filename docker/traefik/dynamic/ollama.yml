http:
  routers:
    ollama:
      rule: "Host(`ollama.oliviero.xyz`)"
      entryPoints:
        - websecure
      tls: true
      service: ollama
    webui:
      rule: "Host(`webui.oliviero.xyz`)"
      entryPoints:
        - websecure
      tls: true
      service: webui

  services:
    ollama:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.120:11434"
    webui:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://192.168.1.120:3000"
