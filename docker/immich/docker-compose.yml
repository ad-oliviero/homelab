name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - ${EXTERNAL_LIBRARY_1}:/mnt/library
    env_file:
      - .env
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false
    labels:
      traefik.enable: true
      traefik.http.routers.immich.rule: Host(`immich.oliviero.xyz`)
      traefik.http.routers.immich.entrypoints: websecure
      traefik.http.routers.immich.tls.certresolver: production
      traefik.http.services.immich.loadbalancer.server.port: 2283
      traefik.docker.network: proxy-net
    hostname: immich
    networks:
      - proxy-net
      - immich-internal

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false
    networks:
      - immich-internal
      - immich-internet

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:c855f98e09d558a0d7cc1a4e56473231206a4c54c0114ada9c485b47aeb92ec8
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    networks:
      - immich-internal

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      DB_STORAGE_TYPE: 'HDD'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: always
    networks:
      - immich-internal

  immich-folder-album-creator:
    container_name: immich_folder_album_creator
    image: salvoxia/immich-folder-album-creator:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${EXTERNAL_LIBRARY_1}:/mnt/library
    environment:
      UNATTENDED: "1"
      API_URL: https://immich.oliviero.xyz/api
      API_KEY: ${IMMICH_FAC_API_KEY}
      ROOT_PATH: /mnt/library
      ALBUM_LEVELS: -1
      ALBUM_SEPARATOR: " - "
      CRON_EXPRESSION: "0 * * * *"

volumes:
  model-cache:
networks:
  proxy-net:
    external: true
  immich-internal:
    internal: true
  immich-internet:
    driver: bridge
