secrets:
  app-secret:
    file: ./secrets/app_secret

services:
  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:latest
    container_name: zerobyte
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    env_file: .env
    secrets:
      - app-secret
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DBS_PATH}/zerobyte:/var/lib/zerobyte
      - ./restored:/restored
      - ${DATA_PATH}/syncthing:/syncthing
    labels:
      traefik.enable: true
      traefik.http.routers.zerobyte.rule: Host(`zb.${DOMAIN}`)
      traefik.http.routers.zerobyte.entrypoints: websecure
      traefik.http.routers.zerobyte.tls: true
      traefik.http.services.zerobyte.loadbalancer.server.port: 4096
      traefik.docker.network: proxy-net
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true
