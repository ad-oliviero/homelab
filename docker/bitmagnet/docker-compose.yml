services:
  bitmagnet:
    image: ghcr.io/bitmagnet-io/bitmagnet:latest
    ports:
    #   - "3333:3333"
      - "3334:3334/tcp"
      - "3334:3334/udp"
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BITMAGNET_HTTP_SERVER_ADDR=:3333
    #      - TMDB_API_KEY=your_api_key
    volumes:
      - /media/storage/data/bitmagnet:/root/.config/bitmagnet
    command:
      - worker
      - run
      - --keys=http_server
      - --keys=queue_server
      # disable the next line to run without DHT crawler
      - --keys=dht_crawler
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      traefik.enable: true
      traefik.http.routers.bitmagnet.rule: Host(`bitmagnet.oliviero.xyz`)
      traefik.http.routers.bitmagnet.entrypoints: websecure
      traefik.http.routers.bitmagnet.tls: true
      traefik.http.services.bitmagnet.loadbalancer.server.port: 3333
      traefik.docker.network: proxy-net
    networks:
      - proxy-net
      - default

  postgres:
    image: postgres:16-alpine
    volumes:
      - ./data/db:/var/lib/postgresql/data
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=bitmagnet
      - PGUSER=${PGUSER}
    shm_size: 1g
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "max_connections=200"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready
      start_period: 20s
      interval: 10s
    networks:
      - default

networks:
  proxy-net:
    external: true
