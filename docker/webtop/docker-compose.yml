services:
  webtop:
    image: lscr.io/linuxserver/webtop:arch-kde
    restart: no
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - /media/storage:/data
      - /media/storage/data/webtop:/config
      - /home/adri/dotfiles:/config/dotfiles:ro
    shm_size: "2gb"
    labels:
      traefik.enable: true
      traefik.http.routers.webtop.rule: Host(`webtop.oliviero.xyz`)
      traefik.http.routers.webtop.entrypoints: websecure
      traefik.http.routers.webtop.tls.certresolver: production
      traefik.http.services.webtop.loadbalancer.server.port: 3000
      traefik.docker.network: proxy-net
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true
