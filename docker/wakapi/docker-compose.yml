secrets:
  password_salt:
    file: ./secrets/password_salt_secret
  smtp_pass:
    file: ./secrets/smtp_pass_secret
  db_password:
    file: ./secrets/db_password_secret

services:
  wakapi:
    image: ghcr.io/muety/wakapi:latest
    restart: unless-stopped
    environment:
      WAKAPI_DB_TYPE: "postgres"
      WAKAPI_DB_NAME: "wakapi"
      WAKAPI_DB_USER: "wakapi"
      WAKAPI_DB_HOST: "db"
      WAKAPI_DB_PORT: "5432"
      WAKAPI_DB_PASSWORD_FILE: "/run/secrets/db_password"
      WAKAPI_PASSWORD_SALT_FILE: "/run/secrets/password_salt"
      WAKAPI_MAIL_SMTP_PASS_FILE: "/run/secrets/smtp_pass"
    secrets:
      - password_salt
      - smtp_pass
      - db_password
    labels:
      traefik.enable: true
      traefik.http.routers.wakapi.rule: Host(`wakapi.oliviero.xyz`)
      traefik.http.routers.wakapi.entrypoints: websecure
      traefik.http.routers.wakapi.tls.certresolver: production
      traefik.http.services.wakapi.loadbalancer.server.port: 3000
    networks:
      - proxy-net
      - wakapi-net

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: "wakapi"
      POSTGRES_PASSWORD_FILE: "/run/secrets/db_password"
      POSTGRES_DB: "wakapi"
    volumes:
      - /media/storage/dbs/wakapi:/var/lib/postgresql/data
    secrets:
      - db_password
    networks:
      - wakapi-net

networks:
  wakapi-net:
    internal: true
  proxy-net:
    external: true
