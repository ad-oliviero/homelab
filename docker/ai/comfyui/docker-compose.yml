services:
  comfyui:
    build: .
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0 
      - HSA_DISABLE_FRAGMENT_ALLOCATOR=1
      - HSA_ENABLE_SDMA=0
      - PYTORCH_HIP_ALLOC_CONF=garbage_collection_threshold:0.6,max_split_size_mb:128,expandable_segments:True
      - PYTORCH_CUDA_ALLOC_CONF=garbage_collection_threshold:0.6,max_split_size_mb:128,expandable_segments:True
      - PYTORCH_ROCM_ARCH=gfx1032
      - CLI_ARGS=--lowvram --force-fp16 --use-split-cross-attention
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    security_opt:
      - seccomp:unconfined
    ipc: host
    ports:
      - 8188:8188
    volumes:
      - ./data/models:/app/models
      - ./data/output:/app/output
      - ./data/custom_nodes:/app/custom_nodes
      - ./data/input:/app/input
      - ./data/user:/app/user
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
