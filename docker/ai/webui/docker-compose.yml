services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    volumes:
      - ./data:/app/backend/data
    ports:
      - 3000:8080
    environment:
      - AIOHTTP_CLIENT_TIMEOUT=6000
      - WEBUI_TIMEOUT=6000
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

