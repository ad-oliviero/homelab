secrets:
  tailscale_auth:
    file: ./secrets/tailscale_auth

services:
  tailscale:
    image: tailscale/tailscale:latest
    network_mode: host
    environment:
      - TS_AUTHKEY=file:/run/secrets/tailscale_auth
      - TS_ROUTES=192.168.1.0/24
      - TS_EXTRA_ARGS=--accept-routes
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ./state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - /lib/modules:/lib/modules:ro
    secrets:
      - tailscale_auth
    cap_add:
      - net_admin
      - sys_module
    privileged: true
    restart: unless-stopped
